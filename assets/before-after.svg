<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 700" width="1240" height="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Before and after Aletheia: a hollow 'done' claim with hidden reproducibility rot becomes an evidence-backed, gate-verified closure.">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1424"/>
      <stop offset="1" stop-color="#090F1B"/>
    </linearGradient>
    <radialGradient id="sealGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A24B" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rotCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17141A"/>
      <stop offset="1" stop-color="#120F16"/>
    </linearGradient>
    <linearGradient id="okCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1B1B"/>
      <stop offset="1" stop-color="#0B1618"/>
    </linearGradient>
    <g id="chk">
      <path d="M0 5 L4 9 L11 0" fill="none" stroke="#4FD1A0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', 'Iowan Old Style', serif; }
      .mono  { font-family: 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace; }
    </style>
  </defs>

  <rect width="1240" height="700" fill="url(#ground)"/>
  <rect x="0.5" y="0.5" width="1239" height="699" fill="none" stroke="#C9A24B" stroke-opacity="0.16"/>

  <!-- Eyebrow / brand -->
  <text x="620" y="52" text-anchor="middle" class="serif" font-size="21" letter-spacing="7" fill="#E7ECF3">A L E T H E I A</text>
  <text x="620" y="78" text-anchor="middle" font-size="12.5" letter-spacing="2.5" fill="#7C8AA0">ἀλήθεια — disclosure: the state of not being hidden</text>

  <!-- Panel labels -->
  <text x="48"  y="126" class="mono" font-size="12.5" letter-spacing="3" fill="#EF5F5F" fill-opacity="0.85">BEFORE — without the discipline</text>
  <text x="1192" y="126" text-anchor="end" class="mono" font-size="12.5" letter-spacing="3" fill="#4FD1A0" fill-opacity="0.9">AFTER — with Aletheia</text>

  <!-- ============ CLAIM CARDS ============ -->
  <!-- Before claim: confident but hollow -->
  <rect x="48" y="146" width="524" height="96" rx="10" fill="url(#rotCard)" stroke="#EF5F5F" stroke-opacity="0.28"/>
  <text x="72" y="188" class="serif" font-size="23" fill="#E7ECF3">“Done — 3.2× speedup over baseline.”</text>
  <text x="72" y="216" font-size="14" fill="#9AA6B6">Ready for the paper.</text>
  <rect x="452" y="200" width="98" height="24" rx="12" fill="#EF5F5F" fill-opacity="0.12" stroke="#EF5F5F" stroke-opacity="0.5"/>
  <text x="501" y="216" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1.5" fill="#EF5F5F">UNVERIFIED</text>

  <!-- After claim: admitted with evidence -->
  <rect x="668" y="146" width="524" height="96" rx="10" fill="url(#okCard)" stroke="#4FD1A0" stroke-opacity="0.32"/>
  <text x="692" y="188" class="serif" font-size="23" fill="#E7ECF3">“3.2× ± 0.4 speedup — admitted.”</text>
  <text x="692" y="216" font-size="14" fill="#9AA6B6">Closure verified against named evidence.</text>
  <rect x="1058" y="200" width="110" height="24" rx="12" fill="#4FD1A0" fill-opacity="0.12" stroke="#4FD1A0" stroke-opacity="0.55"/>
  <text x="1113" y="216" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1.5" fill="#4FD1A0">✓ VERIFIED</text>

  <!-- ============ GATE SEAL (signature element) ============ -->
  <circle cx="620" cy="194" r="88" fill="url(#sealGlow)"/>
  <line x1="620" y1="286" x2="620" y2="612" stroke="#C9A24B" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="2 6"/>
  <circle cx="620" cy="194" r="46" fill="#0C1424" stroke="#C9A24B" stroke-opacity="0.7" stroke-width="1.5"/>
  <circle cx="620" cy="194" r="39" fill="none" stroke="#C9A24B" stroke-opacity="0.28" stroke-width="1"/>
  <text x="620" y="188" text-anchor="middle" font-size="20" fill="#C9A24B">⊘→✓</text>
  <text x="620" y="205" text-anchor="middle" class="mono" font-size="8" letter-spacing="2" fill="#C9A24B" fill-opacity="0.8">PHASE-GATE</text>

  <!-- ============ SUBHEADS ============ -->
  <text x="48"  y="316" class="mono" font-size="12" letter-spacing="2.5" fill="#7C8AA0">WHAT WAS HIDDEN</text>
  <text x="1192" y="316" text-anchor="end" class="mono" font-size="12" letter-spacing="2.5" fill="#7C8AA0">WHAT WAS DISCLOSED</text>
  <line x1="48" y1="330" x2="524" y2="330" stroke="#FFFFFF" stroke-opacity="0.07"/>
  <line x1="716" y1="330" x2="1192" y2="330" stroke="#FFFFFF" stroke-opacity="0.07"/>

  <!-- ============ LEDGER ROWS ============ -->
  <!-- row template: left ghosted rot (y baseline), right disclosed evidence -->

  <!-- 1 · seed -->
  <text x="48"  y="372" class="mono" font-size="14" fill="#6B7A90">seed</text>
  <text x="524" y="372" text-anchor="end" class="mono" font-size="14" fill="#EF5F5F" fill-opacity="0.9">unlogged</text>
  <line x1="150" y1="367" x2="452" y2="367" stroke="#EF5F5F" stroke-opacity="0.25"/>
  <use href="#chk" x="716" y="362"/>
  <text x="736" y="372" class="mono" font-size="14" fill="#B7C2D0">seed 42 recorded</text>
  <text x="1192" y="372" text-anchor="end" class="mono" font-size="14" fill="#4FD1A0">re-derivable</text>

  <!-- 2 · runs -->
  <text x="48"  y="416" class="mono" font-size="14" fill="#6B7A90">runs</text>
  <text x="524" y="416" text-anchor="end" class="mono" font-size="14" fill="#EF5F5F" fill-opacity="0.9">1 (lucky)</text>
  <line x1="150" y1="411" x2="452" y2="411" stroke="#EF5F5F" stroke-opacity="0.25"/>
  <use href="#chk" x="716" y="406"/>
  <text x="736" y="416" class="mono" font-size="14" fill="#B7C2D0">5 replications</text>
  <text x="1192" y="416" text-anchor="end" class="mono" font-size="14" fill="#4FD1A0">± 0.4, 95% CI</text>

  <!-- 3 · tolerance -->
  <text x="48"  y="460" class="mono" font-size="14" fill="#6B7A90">tolerance</text>
  <text x="524" y="460" text-anchor="end" class="mono" font-size="14" fill="#EF5F5F" fill-opacity="0.9">1e-6 → 1e-3 silently</text>
  <line x1="200" y1="455" x2="452" y2="455" stroke="#EF5F5F" stroke-opacity="0.25"/>
  <use href="#chk" x="716" y="450"/>
  <text x="736" y="460" class="mono" font-size="14" fill="#B7C2D0">1e-6 held</text>
  <text x="1192" y="460" text-anchor="end" class="mono" font-size="14" fill="#4FD1A0">deviation logged</text>

  <!-- 4 · citation -->
  <text x="48"  y="504" class="mono" font-size="14" fill="#6B7A90">citation [4]</text>
  <text x="524" y="504" text-anchor="end" class="mono" font-size="14" fill="#EF5F5F" fill-opacity="0.9">DOI never resolved</text>
  <line x1="200" y1="499" x2="452" y2="499" stroke="#EF5F5F" stroke-opacity="0.25"/>
  <use href="#chk" x="716" y="494"/>
  <text x="736" y="504" class="mono" font-size="14" fill="#B7C2D0">DOI 10.1103/… resolved</text>
  <text x="1192" y="504" text-anchor="end" class="mono" font-size="14" fill="#4FD1A0">one-by-one</text>

  <!-- 5 · figure -->
  <text x="48"  y="548" class="mono" font-size="14" fill="#6B7A90">figure 3</text>
  <text x="524" y="548" text-anchor="end" class="mono" font-size="14" fill="#EF5F5F" fill-opacity="0.9">can’t regenerate</text>
  <line x1="150" y1="543" x2="452" y2="543" stroke="#EF5F5F" stroke-opacity="0.25"/>
  <use href="#chk" x="716" y="538"/>
  <text x="736" y="548" class="mono" font-size="14" fill="#B7C2D0">make fig3</text>
  <text x="1192" y="548" text-anchor="end" class="mono" font-size="14" fill="#4FD1A0">regenerates from seed</text>

  <!-- gate verdict nodes at column feet -->
  <rect x="360" y="576" width="164" height="30" rx="15" fill="#EF5F5F" fill-opacity="0.10" stroke="#EF5F5F" stroke-opacity="0.4"/>
  <text x="442" y="596" text-anchor="middle" class="mono" font-size="11" letter-spacing="1" fill="#EF5F5F">⛔ 5 OPEN ITEMS</text>
  <rect x="716" y="576" width="168" height="30" rx="15" fill="#4FD1A0" fill-opacity="0.10" stroke="#4FD1A0" stroke-opacity="0.45"/>
  <text x="800" y="596" text-anchor="middle" class="mono" font-size="11" letter-spacing="1" fill="#4FD1A0">✔ CLOSURE VERIFIED</text>

  <!-- footer -->
  <line x1="48" y1="640" x2="1192" y2="640" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <text x="620" y="672" text-anchor="middle" class="serif" font-size="15" fill="#9AA6B6">A claim follows verification, not the other way around — <tspan fill="#C9A24B">evidence before the claim</tspan>.</text>
</svg>
